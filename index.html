    .topbar {
      position: sticky;

      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1e293b;
      padding: 12px 24px;

      justify-content: flex-end;

    }

    .lang-btn {

      color: #e0f2fe;

      border-radius: 8px;
      font-weight: 700;

    }

    header {
      text-align: center;
      padding: 60px 20px;
    }

    .foto-perfil {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: 4px solid #38bdf8;
      margin-bottom: 20px;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .foto-perfil:hover {
      transform: scale(1.06);
      box-shadow: 0 0 35px rgba(56, 189, 248, 0.65);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 5px;
      font-family: 'Poppins', sans-serif;
    }

    .title-highlight {
      font-size: 22px;
      font-weight: 700;
      color: #38bdf8;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.5px;
      min-height: 32px;
    }

    .typing::after {
      content: "|";
      margin-left: 4px;
      color: #38bdf8;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .about {
      max-width: 720px;
      margin: 15px auto;
      color: #94a3b8;
      line-height: 1.7;
      font-size: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      text-decoration: none;
    }

    .btn img {
      width: 18px;
      height: 18px;
    }

    section {
      padding: 60px 20px;
      max-width: 1100px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
    }

    .card-tech {
      background: #0f172a;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .card-tech img {
      width: 45px;
      margin-bottom: 10px;
    }

    .projects-grid {
      display: flex;
      justify-content: center;
    }

    .card {
      background: #0f172a;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #1e293b;
      max-width: 750px;
      width: 100%;
    }

    .project-img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      margin-bottom: 15px;
    }

    .tags span {
      background: #172554;
      color: #93c5fd;
      padding: 5px;
      margin: 3px;
      border-radius: 6px;
      font-size: 12px;
    }

    .cert-img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #1e293b;
    }

    .cert-link {
      text-decoration: none;
      color: #e2e8f0;
      display: block;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border-radius: 18px;
    }

    .cert-link:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.35);

    .cert-link:hover .card {

      background: #111c33;
    }

</head>

<script>
let currentLang = "en";
let typingTimeout;

function typeText(element, text, speed = 80) {
  clearTimeout(typingTimeout);
  element.innerText = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      element.innerText += text.charAt(i);
      i++;
      typingTimeout = setTimeout(typing, speed);
    }
  }

  typing();
}

function setLang(lang) {
  currentLang = lang;

  document.querySelectorAll("[data-en]").forEach(el => {
    if (el.id !== "typing-title") {
      el.innerText = el.getAttribute("data-" + lang);
    }
  });

  const title = document.getElementById("typing-title");
  typeText(title, title.getAttribute("data-" + lang));
}

setLang("en");
</script>

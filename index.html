<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <title>Pedro | Data Engineer</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #020617;
      color: #e2e8f0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(2, 6, 23, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1e293b;
      padding: 12px 24px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .lang-btn {
      border: 1px solid #38bdf8;
      background: #172554;
      color: #e0f2fe;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    header {
      text-align: center;
      padding: 60px 20px;
    }

    .foto-perfil {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 4px solid #38bdf8;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      text-decoration: none;
    }

    .btn img {
      width: 18px;
      height: 18px;
    }

    section {
      padding: 60px 20px;
      max-width: 1100px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
    }

    .card-tech {
      background: #0f172a;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .card-tech img {
      width: 45px;
      margin-bottom: 10px;
    }

    .projects-grid {
      display: flex;
      justify-content: center;
    }

    .card {
      background: #0f172a;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #1e293b;
      max-width: 750px;
      width: 100%;
    }

    /* ✅ IMAGEM AJUSTADA */
    .project-img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      margin-bottom: 15px;
    }

    .tags span {
      background: #172554;
      color: #93c5fd;
      padding: 5px;
      margin: 3px;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="setLang('en')" class="lang-btn">EN</button>
  <button onclick="setLang('pt')" class="lang-btn">PT</button>
</div>

<header>
  <img src="assets/foto.jpg" class="foto-perfil">
  <h1>Pedro Henrique</h1>

  <p data-en="Data Engineer" data-pt="Engenheiro de Dados"></p>

  <div>

    <a href="https://wa.me/5521994536481" class="btn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
      WhatsApp
    </a>

    <a href="https://www.linkedin.com/in/pedro-henrique-sousa-/" class="btn">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg">
      LinkedIn
    </a>

    <a href="https://github.com/phsoousa" class="btn">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" style="filter: invert(1);">
      GitHub
    </a>

  </div>
</header>

<section>
  <h2>Tech Stack</h2>

  <div class="grid">
    <div class="card-tech"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg"><p>Python</p></div>
    <div class="card-tech"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/azuresqldatabase/azuresqldatabase-original.svg"><p>SQL</p></div>
    <div class="card-tech"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f3/Apache_Spark_logo.svg"><p>Spark</p></div>
    <div class="card-tech"><img src="https://upload.wikimedia.org/wikipedia/commons/6/63/Databricks_Logo.png"><p>Databricks</p></div>
    <div class="card-tech"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apacheairflow/apacheairflow-original.svg"><p>Airflow</p></div>
    <div class="card-tech"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/amazonwebservices/amazonwebservices-original-wordmark.svg"><p>AWS</p></div>
    <div class="card-tech"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/googlecloud/googlecloud-original.svg"><p>GCP</p></div>
    <div class="card-tech"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/pandas/pandas-original.svg"><p>Pandas</p></div>
    <div class="card-tech"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/postgresql/postgresql-original.svg"><p>PostgreSQL</p></div>
    <div class="card-tech"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg"><p>Docker</p></div>
    <div class="card-tech"><img src="https://upload.wikimedia.org/wikipedia/commons/c/cf/New_Power_BI_Logo.svg"><p>Power BI</p></div>
    <div class="card-tech"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg"><p>Git</p></div>
  </div>
</section>

<section>
  <h2>Projects</h2>

  <div class="projects-grid">
    <div class="card">

      <!-- ✅ IMAGEM AJUSTADA -->
      <img src="assets/webtran-card.png" class="project-img">

      <div class="tags">
        <span>Python</span>
        <span>Selenium</span>
        <span>Airflow</span>
      </div>

      <h3>WebTran Data Pipeline</h3>

      <p>End-to-end data pipeline for automation and analytics.</p>

      <a href="https://github.com/phsoousa/airflow-brawebtran-data-pipeline" class="btn">
        View Project
      </a>

    </div>
  </div>
</section>

<script>
function setLang(lang) {
  document.querySelectorAll("[data-en]").forEach(el => {
    el.innerText = el.getAttribute("data-" + lang);
  });
}
setLang("en");
</script>

</body>
</html>
